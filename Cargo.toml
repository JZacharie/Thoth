[package]
name = "thoth"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio = { version = "1", features = ["full"] }
arboard = { version = "3", default-features = false }
reqwest = { version = "0.13", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
toml = "1.1"
thiserror = "2"
regex = "1"

[package.metadata.cargo-udeps.ignore]
development = []
normal = ["thiserror"]

[dev-dependencies]
wiremock = "0.6"

[target.'cfg(windows)'.dependencies]
rdev = "0.5"
notify-rust = "4"
tray-icon = "0.24"
winreg = "0.56"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = "symbols"

[profile.dev]
opt-level = 0
debug = true

[workspace]

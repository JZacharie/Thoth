name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_DEFAULT: sparse
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Pre-checks rapides (pas de compilation Rust) ──────────────
  lint:
    name: Lint (actionlint + gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error

      - name: GitLeaks (secret scanning)
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        if: env.GITLEAKS_LICENSE != ''
        uses: gitleaks/gitleaks-action@v3

  # ── Qualité + tests (1 compilation dev, outils dédiés) ──────
  check:
    name: Check & Test
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache Cargo (registry + target)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: check
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run tests (nextest)
        run: cargo nextest run --workspace --no-fail-fast
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: true

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Check licenses + advisories (cargo-deny)
        run: cargo deny check

  # ── Vérification MSRV ────────────────────────────────────────
  msrv:
    name: MSRV (1.88.0)
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (1.88.0)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv

      - name: cargo check
        run: cargo check --workspace
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: true

  # ── Build release (Windows) ──────────────────────────────────
  build-windows:
    name: Build (Windows)
    needs: [lint, check, msrv]
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: sccache
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: Cache Cargo (registry)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-win

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: true
          RUSTFLAGS: "-C target-feature=+crt-static -C lto=yes -C codegen-units=1 -C opt-level=z"

      - name: Self-sign binary (temporary self-signed cert)
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=ThothDev" -CertStoreLocation Cert:\CurrentUser\My
          $certBytes = $cert.Export([System.Security.Cryptography.X509Certificates.X509ContentType]::Cert)
          $tempCertPath = [System.IO.Path]::GetTempFileName()
          [System.IO.File]::WriteAllBytes($tempCertPath, $certBytes)
          Import-Certificate -FilePath $tempCertPath -CertStoreLocation Cert:\CurrentUser\Root *>$null
          Copy-Item $tempCertPath target/x86_64-pc-windows-msvc/release/thoth-dev.cer
          Remove-Item $tempCertPath
          Set-AuthenticodeSignature -FilePath target/x86_64-pc-windows-msvc/release/thoth.exe -Certificate $cert | Out-Null
          Write-Host "[OK] Binary self-signed"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: thoth-windows-x86_64
          path: |
            target/x86_64-pc-windows-msvc/release/thoth.exe
            target/x86_64-pc-windows-msvc/release/thoth-dev.cer

  # ── Build (macOS) ────────────────────────────────────────────
  build-macos:
    name: Build (macOS)
    needs: [lint, check, msrv]
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: sccache
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-macos

      - name: Build release binary
        run: cargo build --release
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: true

      - name: Create macOS app bundle
        run: |
          mkdir -p Thoth.app/Contents/MacOS
          cp target/release/thoth Thoth.app/Contents/MacOS/
          cp resources/thoth.png Thoth.app/Contents/Resources/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: thoth-macos-aarch64
          path: Thoth.app
          compression-level: 0

  # ── Build (Linux) ────────────────────────────────────────────
  build-linux:
    name: Build (Linux)
    needs: [lint, check, msrv]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libxcb1-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libdbus-1-dev libx11-dev libxkbcommon-dev libwayland-dev

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: sccache
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-linux

      - name: Build release binary
        run: cargo build --release
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: thoth-linux-x86_64
          path: target/release/thoth
          compression-level: 0

  # ── MSI (chaque push sur main, pas besoin de signature) ──────
  msi:
    name: Build MSI
    needs: [build-windows]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: thoth-windows-x86_64
          path: ./release

      - name: Install WiX CLI
        run: dotnet tool install --global wix

      - name: Build MSI (WiX)
        run: wix build -acceptEula wix7 ./installer/Thoth.wxs -o ./Thoth-nightly.msi -d ThothBinary=./release/thoth.exe -d version=0.1.0

      - name: Self-sign MSI (temporary self-signed cert)
        shell: pwsh
        run: |
          $cert = Get-ChildItem Cert:\CurrentUser\My | Where-Object { $_.Subject -eq "CN=ThothDev" } | Select-Object -First 1
          if (-not $cert) {
            $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=ThothDev" -CertStoreLocation Cert:\CurrentUser\My
            $certBytes = $cert.Export([System.Security.Cryptography.X509Certificates.X509ContentType]::Cert)
            $tempCertPath = [System.IO.Path]::GetTempFileName()
            [System.IO.File]::WriteAllBytes($tempCertPath, $certBytes)
            Import-Certificate -FilePath $tempCertPath -CertStoreLocation Cert:\CurrentUser\Root *>$null
            Remove-Item $tempCertPath
          }
          Set-AuthenticodeSignature -FilePath ./Thoth-nightly.msi -Certificate $cert | Out-Null
          Write-Host "[OK] MSI self-signed"

      - name: Upload MSI
        uses: actions/upload-artifact@v7
        with:
          name: thoth-msi
          path: ./Thoth-nightly.msi
          compression-level: 0

  # ── MSI signé (tags uniquement) ─────────────────────────────
  msi-release:
    name: Build MSI (Release)
    needs: [build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: thoth-windows-x86_64
          path: ./release

      - name: Install WiX CLI
        run: dotnet tool install --global wix

      - name: Build MSI (WiX)
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          wix build -acceptEula wix7 ./installer/Thoth.wxs -o ./Thoth-${{ github.ref_name }}.msi -d ThothBinary=./release/thoth.exe -d version=$version

      - name: Self-sign MSI (temporary self-signed cert)
        shell: pwsh
        run: |
          $cert = Get-ChildItem Cert:\CurrentUser\My | Where-Object { $_.Subject -eq "CN=ThothDev" } | Select-Object -First 1
          if (-not $cert) {
            $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=ThothDev" -CertStoreLocation Cert:\CurrentUser\My
            $certBytes = $cert.Export([System.Security.Cryptography.X509Certificates.X509ContentType]::Cert)
            $tempCertPath = [System.IO.Path]::GetTempFileName()
            [System.IO.File]::WriteAllBytes($tempCertPath, $certBytes)
            Import-Certificate -FilePath $tempCertPath -CertStoreLocation Cert:\CurrentUser\Root *>$null
            Remove-Item $tempCertPath
          }
          Set-AuthenticodeSignature -FilePath ./Thoth-${{ github.ref_name }}.msi -Certificate $cert | Out-Null
          Write-Host "[OK] MSI self-signed"

      - name: Upload MSI
        uses: actions/upload-artifact@v7
        with:
          name: thoth-msi-release
          path: ./Thoth-${{ github.ref_name }}.msi
          compression-level: 0

  # ── GitHub Release (tags uniquement) ─────────────────────────
  release:
    name: Publish Release
    needs: [build-windows, build-macos, build-linux, msi-release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: thoth-windows-x86_64
          path: ./release/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: thoth-macos-aarch64
          path: ./release/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: thoth-linux-x86_64
          path: ./release/linux

      - name: Download release MSI
        uses: actions/download-artifact@v8
        with:
          name: thoth-msi-release
          path: ./release

      - name: Prepare release assets
        run: |
          # Windows
          sha256sum ./release/windows/thoth.exe > ./release/windows/thoth.exe.sha256
          cp ./release/windows/thoth-dev.cer ./thoth-dev.cer
          zip -j thoth-windows-x86_64.zip ./release/windows/thoth.exe ./release/windows/thoth.exe.sha256 ./release/windows/thoth-dev.cer
          # Linux
          sha256sum ./release/linux/thoth > ./release/linux/thoth.sha256
          tar -czf thoth-linux-x86_64.tar.gz -C ./release/linux thoth thoth.sha256
          # macOS
          zip -r thoth-macos-aarch64.zip ./release/macos/Thoth.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            thoth-windows-x86_64.zip
            ./release/windows/thoth.exe
            ./release/windows/thoth.exe.sha256
            ./release/windows/thoth-dev.cer
            ./release/Thoth-*.msi
            thoth-linux-x86_64.tar.gz
            ./release/linux/thoth
            thoth-macos-aarch64.zip
          generate_release_notes: true
          draft: false
          prerelease: false

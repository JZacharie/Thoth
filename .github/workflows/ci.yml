name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Check for outdated crates
        continue-on-error: true
        run: |
          cargo install cargo-outdated
          cargo outdated --exit-code 1

      - name: Audit security vulnerabilities
        continue-on-error: true
        run: |
          cargo install cargo-audit
          cargo audit

  build:
    name: Build Release
    needs: [check]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc
        env:
          RUSTFLAGS: "-C target-feature=+crt-static -C lto=yes -C codegen-units=1 -C opt-level=z"

      - name: Strip binary
        run: rust-objcopy --strip-all target/x86_64-pc-windows-msvc/release/thoth.exe target/x86_64-pc-windows-msvc/release/thoth-stripped.exe
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: thoth-windows-x86_64
          path: target/x86_64-pc-windows-msvc/release/thoth.exe
          compression-level: 0

  sign:
    name: Sign Binary
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: thoth-windows-x86_64
          path: ./release

      - name: Sign binary
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          echo "$env:CERTIFICATE_BASE64" | base64 --decode > cert.pfx
          & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" sign `
            /fd SHA256 /f cert.pfx /p "$env:CERTIFICATE_PASSWORD" `
            /tr http://timestamp.digicert.com /td SHA256 /v ./release/thoth.exe

      - name: Upload signed binary
        uses: actions/upload-artifact@v4
        with:
          name: thoth-windows-x86_64
          path: ./release/thoth.exe
          compression-level: 0
          overwrite: true

  msi:
    name: Build MSI
    needs: [build, sign]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download signed binary
        uses: actions/download-artifact@v4
        with:
          name: thoth-windows-x86_64
          path: ./release

      - name: Build MSI
        uses: wixtoolset/actions-wix@v1
        with:
          source: ./installer/Thoth.wxs
          output: ./Thoth-${{ github.ref_name }}.msi
          variables: "ThothBinary=./release/thoth.exe"

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: thoth-windows-x86_64
          path: ./Thoth-*.msi
          compression-level: 0

  release:
    name: Publish Release
    needs: [build, sign, msi]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare release assets
        shell: pwsh
        run: |
          Copy-Item ./artifacts/thoth-windows-x86_64/thoth.exe ./release/thoth.exe
          certutil -hashfile ./release/thoth.exe SHA256 > ./release/thoth.exe.sha256
          Compress-Archive -Path ./release/thoth.exe, ./release/thoth.exe.sha256 -DestinationPath thoth-windows-x86_64.zip

      - name: Collect MSI
        shell: pwsh
        run: |
          $msi = Get-ChildItem ./artifacts -Filter "*.msi" | Select-Object -First 1
          if ($msi) { Copy-Item $msi.FullName ./release/ }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            thoth-windows-x86_64.zip
            ./release/thoth.exe
            ./release/thoth.exe.sha256
            ./release/*.msi
          generate_release_notes: true
          draft: false
          prerelease: false

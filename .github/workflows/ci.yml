name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_DEFAULT: sparse
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_INCREMENTAL: 0

jobs:
  # ── Pre-checks rapides (lint workflow + fmt) ──────────────────
  precheck:
    name: Pre-check (actionlint + gitleaks + fmt)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error

      - name: GitLeaks (secret scanning)
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        if: env.GITLEAKS_LICENSE != ''
        uses: gitleaks/gitleaks-action@v3

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  # ── Qualité + tests ───────────────────────────────────────────
  check:
    name: Check & Test
    needs: [precheck]
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache Cargo (registry + target)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-rust
          cache-on-failure: true

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run tests (nextest)
        run: cargo nextest run --workspace --no-fail-fast

      # cargo-deny uniquement sur main + tags (pas sur les PRs)
      - name: Install cargo-deny
        if: github.event_name == 'push'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Check licenses + advisories (cargo-deny)
        if: github.event_name == 'push'
        run: cargo deny check

  # ── MSRV : uniquement sur main + tags (pas sur les PRs) ───────
  msrv:
    name: MSRV (1.92.0)
    if: github.event_name == 'push'
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust (1.92.0)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv

      - name: cargo check
        run: cargo check --workspace

  # ═══════════════════════════════════════════════════════════════
  # ── FAST BUILD : PRs + push main (thin LTO, sccache) ─────────
  # ═══════════════════════════════════════════════════════════════

  build-windows-fast:
    name: Build Windows (fast)
    needs: [check]
    if: "!startsWith(github.ref, 'refs/tags/v')"
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-rust
          cache-on-failure: true

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"

      - name: Sign & export certificate (fast)
        if: github.event_name == 'push'
        shell: pwsh
        env:
          CODESIGN_PFX_B64: ${{ secrets.CODESIGN_PFX_B64 }}
          CODESIGN_PFX_PWD: ${{ secrets.CODESIGN_PFX_PWD }}
        run: |
          $outDir  = "target/x86_64-pc-windows-msvc/release"
          $pfxPath = [System.IO.Path]::Combine($env:RUNNER_TEMP, "thoth-sign.pfx")
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "x64" } | Select-Object -First 1).FullName

          if ($env:CODESIGN_PFX_B64) {
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CODESIGN_PFX_B64))
            $pfxPwd = $env:CODESIGN_PFX_PWD
            $cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new($pfxPath, $pfxPwd)
            [IO.File]::WriteAllBytes("$outDir/thoth-dev.cer", $cert.RawData)
            Write-Host "[OK] Persistent certificate loaded"
          } else {
            Write-Warning "CODESIGN_PFX_B64 not set — using ephemeral self-signed cert"
            $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=ThothDev" -CertStoreLocation Cert:\CurrentUser\My
            [IO.File]::WriteAllBytes("$outDir/thoth-dev.cer", $cert.RawData)
            [IO.File]::WriteAllBytes($pfxPath, $cert.Export(
              [System.Security.Cryptography.X509Certificates.X509ContentType]::Pfx, "ci-dev-only"))
            $pfxPwd = "ci-dev-only"
          }

          & $signtool sign /fd SHA256 /f $pfxPath /p $pfxPwd /q `
            "$outDir/thoth.exe"
          Remove-Item $pfxPath -ErrorAction SilentlyContinue
          Write-Host "[OK] Binary signed (no timestamp)"

      - name: Export .cer only (PR — no signing)
        if: github.event_name == 'pull_request'
        shell: pwsh
        env:
          CODESIGN_PFX_B64: ${{ secrets.CODESIGN_PFX_B64 }}
          CODESIGN_PFX_PWD: ${{ secrets.CODESIGN_PFX_PWD }}
        run: |
          $outDir  = "target/x86_64-pc-windows-msvc/release"
          if ($env:CODESIGN_PFX_B64) {
            $pfxPath = [System.IO.Path]::Combine($env:RUNNER_TEMP, "thoth-sign.pfx")
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CODESIGN_PFX_B64))
            $cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new($pfxPath, $env:CODESIGN_PFX_PWD)
            [IO.File]::WriteAllBytes("$outDir/thoth-dev.cer", $cert.RawData)
            Remove-Item $pfxPath -ErrorAction SilentlyContinue
          } else {
            $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=ThothDev" -CertStoreLocation Cert:\CurrentUser\My
            [IO.File]::WriteAllBytes("$outDir/thoth-dev.cer", $cert.RawData)
          }
          Write-Host "[OK] Certificate exported (PR — exe not signed)"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: thoth-windows-x86_64
          path: |
            target/x86_64-pc-windows-msvc/release/thoth.exe
            target/x86_64-pc-windows-msvc/release/thoth-dev.cer

  # ═══════════════════════════════════════════════════════════════
  # ── RELEASE BUILDS : tags v* uniquement ───────────────────────
  # Profil release-opt (fat LTO, CU=1) — binaire optimal
  # sccache désactivé (fat LTO incompatible avec le cache d'objets)
  # ═══════════════════════════════════════════════════════════════

  build-windows-release:
    name: Build Windows (release-opt)
    needs: [check, msrv]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry (pas de target cache — fat LTO invalide les objets)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-win
          cache-targets: false

      - name: Build release-opt (fat LTO, CU=1)
        run: cargo build --profile release-opt --target x86_64-pc-windows-msvc
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"

      - name: Sign & export certificate (release-opt)
        shell: pwsh
        env:
          CODESIGN_PFX_B64: ${{ secrets.CODESIGN_PFX_B64 }}
          CODESIGN_PFX_PWD: ${{ secrets.CODESIGN_PFX_PWD }}
        run: |
          $outDir  = "target/x86_64-pc-windows-msvc/release-opt"
          $pfxPath = [System.IO.Path]::Combine($env:RUNNER_TEMP, "thoth-sign.pfx")
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "x64" } | Select-Object -First 1).FullName

          if ($env:CODESIGN_PFX_B64) {
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CODESIGN_PFX_B64))
            $pfxPwd = $env:CODESIGN_PFX_PWD
            $cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new($pfxPath, $pfxPwd)
            [IO.File]::WriteAllBytes("$outDir/thoth-dev.cer", $cert.RawData)
            Write-Host "[OK] Persistent certificate loaded"
          } else {
            Write-Warning "CODESIGN_PFX_B64 not set — using ephemeral self-signed cert"
            $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=ThothDev" -CertStoreLocation Cert:\CurrentUser\My
            [IO.File]::WriteAllBytes("$outDir/thoth-dev.cer", $cert.RawData)
            [IO.File]::WriteAllBytes($pfxPath, $cert.Export(
              [System.Security.Cryptography.X509Certificates.X509ContentType]::Pfx, "ci-dev-only"))
            $pfxPwd = "ci-dev-only"
          }

          & $signtool sign /fd SHA256 /f $pfxPath /p $pfxPwd /q `
            "$outDir/thoth.exe"
          Remove-Item $pfxPath -ErrorAction SilentlyContinue
          Write-Host "[OK] Binary signed (no timestamp)"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: thoth-windows-x86_64
          path: |
            target/x86_64-pc-windows-msvc/release-opt/thoth.exe
            target/x86_64-pc-windows-msvc/release-opt/thoth-dev.cer

  build-macos-release:
    name: Build macOS (release-opt)
    needs: [check, msrv]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-macos
          cache-targets: false

      - name: Build release-opt (fat LTO, CU=1)
        run: cargo build --profile release-opt

      - name: Create macOS app bundle
        run: |
          mkdir -p Thoth.app/Contents/MacOS
          cp target/release-opt/thoth Thoth.app/Contents/MacOS/
          cp resources/thoth.png Thoth.app/Contents/Resources/ 2>/dev/null || true
          tar -czf thoth-macos.tar.gz Thoth.app

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: thoth-macos-aarch64
          path: thoth-macos.tar.gz
          compression-level: 0

  build-linux-release:
    name: Build Linux (release-opt)
    needs: [check, msrv]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libglib2.0-dev libxcb1-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libdbus-1-dev libx11-dev libxkbcommon-dev libwayland-dev \
            libgtk-3-dev libayatana-appindicator3-dev

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-linux
          cache-targets: false

      - name: Build release-opt (fat LTO, CU=1)
        run: cargo build --profile release-opt

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: thoth-linux-x86_64
          path: target/release-opt/thoth
          compression-level: 0

  # ── MSI nightly (push main) ───────────────────────────────────
  msi:
    name: Build MSI (nightly)
    needs: [build-windows-fast]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: thoth-windows-x86_64
          path: ./release

      - name: Install WiX CLI
        run: dotnet tool install --global wix

      - name: Extract version from Cargo.toml
        id: ver
        shell: bash
        run: echo "version=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"

      - name: Build MSI (WiX)
        run: wix build -acceptEula wix7 ./installer/Thoth.wxs -o ./Thoth-nightly.msi -d ThothBinary=./release/thoth.exe -d version=${{ steps.ver.outputs.version }}

      - name: Sign MSI (persistent cert)
        shell: pwsh
        env:
          CODESIGN_PFX_B64: ${{ secrets.CODESIGN_PFX_B64 }}
          CODESIGN_PFX_PWD: ${{ secrets.CODESIGN_PFX_PWD }}
        run: |
          $pfxPath = [System.IO.Path]::Combine($env:RUNNER_TEMP, "thoth-sign.pfx")
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "x64" } | Select-Object -First 1).FullName
          if ($env:CODESIGN_PFX_B64) {
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CODESIGN_PFX_B64))
            $pfxPwd = $env:CODESIGN_PFX_PWD
          } else {
            Write-Warning "CODESIGN_PFX_B64 not set — using ephemeral self-signed cert"
            $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=ThothDev" -CertStoreLocation Cert:\CurrentUser\My
            [IO.File]::WriteAllBytes($pfxPath, $cert.Export(
              [System.Security.Cryptography.X509Certificates.X509ContentType]::Pfx, "ci-dev-only"))
            $pfxPwd = "ci-dev-only"
          }
          & $signtool sign /fd SHA256 /f $pfxPath /p $pfxPwd /q ./Thoth-nightly.msi
          Remove-Item $pfxPath -ErrorAction SilentlyContinue
          Write-Host "[OK] MSI signed"

      - name: Upload MSI
        uses: actions/upload-artifact@v7
        with:
          name: thoth-msi
          path: ./Thoth-nightly.msi
          compression-level: 0

  # ── MSI release (tags v*) ─────────────────────────────────────
  msi-release:
    name: Build MSI (Release)
    needs: [build-windows-release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: thoth-windows-x86_64
          path: ./release

      - name: Install WiX CLI
        run: dotnet tool install --global wix

      - name: Build MSI (WiX)
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          wix build -acceptEula wix7 ./installer/Thoth.wxs -o ./Thoth-${{ github.ref_name }}.msi -d ThothBinary=./release/thoth.exe -d version=$version

      - name: Sign MSI (persistent cert)
        shell: pwsh
        env:
          CODESIGN_PFX_B64: ${{ secrets.CODESIGN_PFX_B64 }}
          CODESIGN_PFX_PWD: ${{ secrets.CODESIGN_PFX_PWD }}
        run: |
          $pfxPath = [System.IO.Path]::Combine($env:RUNNER_TEMP, "thoth-sign.pfx")
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "x64" } | Select-Object -First 1).FullName
          if ($env:CODESIGN_PFX_B64) {
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CODESIGN_PFX_B64))
            $pfxPwd = $env:CODESIGN_PFX_PWD
          } else {
            Write-Warning "CODESIGN_PFX_B64 not set — using ephemeral self-signed cert"
            $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=ThothDev" -CertStoreLocation Cert:\CurrentUser\My
            [IO.File]::WriteAllBytes($pfxPath, $cert.Export(
              [System.Security.Cryptography.X509Certificates.X509ContentType]::Pfx, "ci-dev-only"))
            $pfxPwd = "ci-dev-only"
          }
          & $signtool sign /fd SHA256 /f $pfxPath /p $pfxPwd /q ./Thoth-${{ github.ref_name }}.msi
          Remove-Item $pfxPath -ErrorAction SilentlyContinue
          Write-Host "[OK] MSI signed"

      - name: Upload MSI
        uses: actions/upload-artifact@v7
        with:
          name: thoth-msi-release
          path: ./Thoth-${{ github.ref_name }}.msi
          compression-level: 0

  # ── GitHub Release (tags uniquement) ─────────────────────────
  release:
    name: Publish Release
    needs: [build-windows-release, build-macos-release, build-linux-release, msi-release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: thoth-windows-x86_64
          path: ./release/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: thoth-macos-aarch64
          path: ./release/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: thoth-linux-x86_64
          path: ./release/linux

      - name: Download release MSI
        uses: actions/download-artifact@v8
        with:
          name: thoth-msi-release
          path: ./release

      - name: Prepare release assets
        run: |
          sha256sum ./release/windows/thoth.exe > ./release/windows/thoth.exe.sha256
          cp ./release/windows/thoth-dev.cer ./thoth-dev.cer
          zip -j thoth-windows-x86_64.zip ./release/windows/thoth.exe ./release/windows/thoth.exe.sha256 ./release/windows/thoth-dev.cer
          sha256sum ./release/linux/thoth > ./release/linux/thoth.sha256
          tar -czf thoth-linux-x86_64.tar.gz -C ./release/linux thoth thoth.sha256
          tar -xzf ./release/macos/thoth-macos.tar.gz -C ./release/macos/
          zip -r thoth-macos-aarch64.zip ./release/macos/Thoth.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            thoth-windows-x86_64.zip
            ./release/windows/thoth.exe
            ./release/windows/thoth.exe.sha256
            ./release/windows/thoth-dev.cer
            ./release/Thoth-*.msi
            thoth-linux-x86_64.tar.gz
            ./release/linux/thoth
            ./release/linux/thoth.sha256
            thoth-macos-aarch64.zip
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: false
          draft: false
          prerelease: false

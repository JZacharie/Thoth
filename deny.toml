[advisories]
unmaintained = "all"
unused-ignored-advisory = "allow"
ignore = [
    # tray-icon dépend de gtk (Linux seulement), pas utilisé sur Windows
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0420",
    "RUSTSEC-2024-0419",
    # proc-macro-error: déprécié, dépendance transitive
    "RUSTSEC-2024-0370",
    "RUSTSEC-2026-0009",
    # rustls-pemfile: déprécié, dépendance transitive de rust-s3
    "RUSTSEC-2025-0134",
    # webpki CRL: dépendance transitive de rustls
    "RUSTSEC-2026-0049",
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0104",
    # memmap2: unsound pointer offset — dépendance transitive de xcap/smithay/winit, pas corrigeable directement
    "RUSTSEC-2026-0186",
    # quick-xml: quadratic run time + unbounded NS allocation — dépendances transitives, pas de mise à jour directe possible
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
unused-allowed-license = "allow"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
    "BSL-1.0",
    "OFL-1.1",
    "LicenseRef-UFL-1.0",
    "Unlicense",
    "BSD-2-Clause",
    "Ubuntu-font-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []

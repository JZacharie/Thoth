[advisories]
vulnerability = "deny"
unmaintained = "warn"
notice = "warn"
ignore = [
    # tray-icon dépend de gtk (Linux seulement), pas utilisé sur Windows
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0420",
    "RUSTSEC-2024-0419",
    # glib: unsound dans un itérateur non utilisé par Thoth
    "RUSTSEC-2024-0429",
    # proc-macro-error: déprécié, dépendance transitive
    "RUSTSEC-2024-0370",
]

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "OpenSSL",
]
deny = []
copyleft = "deny"
allow-osi-fsf-free = "neither"
default = "deny"
confidence = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
